<!DOCTYPE html>
<html>
<head>
    <title>实例管理测试</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h2>实例列表</h2>
    <table>
        <thead>
            <tr>
                <th>域名/IP</th>
                <th>实例类型</th>
                <th>版本/规格</th>
                <th>开始时间</th>
                <th>到期时间</th>
                <th>状态</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="instanceTableBody">
            <tr><td colspan="7">加载中...</td></tr>
        </tbody>
    </table>

    <script>
    const API_BASE_URL = '/api/v1';
    const CURRENT_USER_ID = 30611;
    let API_TOKEN = '';

    async function fetchToken() {
        const response = await fetch(`${API_BASE_URL}/auth/token`);
        const data = await response.json();
        if (data.code === 0) {
            API_TOKEN = data.data.access_token;
            return true;
        }
        return false;
    }

    async function loadInstances() {
        const response = await fetch(`${API_BASE_URL}/instances?php_user_id=${CURRENT_USER_ID}`, {
            headers: { 'Authorization': `Bearer ${API_TOKEN}` }
        });
        const data = await response.json();
        return data;
    }

    function renderTable(instances) {
        const tbody = document.getElementById('instanceTableBody');
        
        if (!instances || instances.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7">暂无数据</td></tr>';
            return;
        }

        const productTypeMap = { 1: '云推送', 2: '云部署', 3: '云网关' };
        const statusMap = { 1: '生效中', 2: '已过期' };

        tbody.innerHTML = instances.map(instance => `
            <tr>
                <td>${instance.domain}</td>
                <td>${productTypeMap[instance.product_type] || '未知'}</td>
                <td>${instance.edition_name || instance.edition}</td>
                <td>${instance.start_time || '-'}</td>
                <td>${instance.end_time || '-'}</td>
                <td>${statusMap[instance.status] || '未知'}</td>
                <td>
                    <button onclick="configInstance(${instance.id})">配置</button>
                    <button onclick="renewInstance(${instance.id})">续费</button>
                    <button onclick="upgradeInstance(${instance.id})">升级</button>
                </td>
            </tr>
        `).join('');
    }

    function configInstance(id) {
        window.location.href = `autocertconfig.html?id=${id}`;
    }

    function renewInstance(id) {
        alert('续费功能开发中，实例ID: ' + id);
    }

    function upgradeInstance(id) {
        alert('升级功能开发中，实例ID: ' + id);
    }

    async function init() {
        await fetchToken();
        const data = await loadInstances();
        if (data.code === 0 && data.data.list) {
            renderTable(data.data.list);
        } else {
            document.getElementById('instanceTableBody').innerHTML = '<tr><td colspan="7">加载失败: ' + (data.message || '未知错误') + '</td></tr>';
        }
    }

    init();
    </script>
</body>
</html>
